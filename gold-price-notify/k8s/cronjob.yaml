apiVersion: batch/v1
kind: CronJob
metadata:
  name: gold-price-notify
spec:
  schedule: "*/2 * * * *"
  jobTemplate:
    spec:
      template:
        metadata: {}
        spec:
          containers:
          - name: gold-app
            image: harshalpantawane/gold-app:latest
            envFrom:
            - secretRef:
                name: gold-secret
          restartPolicy: OnFailure
